services:
  - type: web
    name: taskflow-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false         # Set this in Render dashboard
      - key: CLIENT_URL
        sync: false         # Set to your Vercel deployment URL
